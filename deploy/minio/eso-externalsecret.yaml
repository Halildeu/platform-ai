# #55 ESO ExternalSecret — MinIO credentials for k8s consumers (gateway,
# transcript-service). The actual secret values live in the cluster's
# SecretStore backend (same pattern as Faz 22-23 ESO usage); nothing here is a
# credential.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: minio-credentials
  namespace: platform-ai
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: platform-secret-store   # existing Faz 22-23 store
    kind: ClusterSecretStore
  target:
    name: minio-credentials
    creationPolicy: Owner
  data:
    - secretKey: MINIO_ROOT_USER
      remoteRef:
        key: faz24/minio
        property: root_user
    - secretKey: MINIO_ROOT_PASSWORD
      remoteRef:
        key: faz24/minio
        property: root_password
    - secretKey: MINIO_ENDPOINT
      remoteRef:
        key: faz24/minio
        property: endpoint
