[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N", "S", "BLE", "A", "C4", "T20", "SIM", "RUF"]
ignore = ["S101"]  # assert OK in tests
# Turkish project: dotless-ı etc. in docstrings are intentional, not typos.
allowed-confusables = ["ı", "İ", "ş", "Ş", "ğ", "Ğ", "ö", "Ö", "ü", "Ü", "ç", "Ç"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "S105", "S106"]
# Measurement CLI: print is the output; subprocess spawns nvidia-smi (fixed args).
"scripts/*" = ["T201", "S603", "S607"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_ignores = true
warn_redundant_casts = true

[[tool.mypy.overrides]]
module = ["pyannote.*", "speechbrain.*"]
ignore_missing_imports = true

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -v --strict-markers"
markers = [
    "integration: requires real pyannote model + HF token (opt-in)",
]
