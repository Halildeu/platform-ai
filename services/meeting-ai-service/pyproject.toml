[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N", "S", "BLE", "A", "C4", "T20", "SIM", "RUF"]
# RUF001/002/003: Turkish text legitimately uses ı/İ/ş/ğ — not "ambiguous" here.
ignore = ["S101", "RUF001", "RUF002", "RUF003"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "S105", "S106"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_ignores = true
warn_redundant_casts = true

[[tool.mypy.overrides]]
module = ["anthropic.*", "openai.*", "ollama.*"]
ignore_missing_imports = true

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -v --strict-markers"
markers = [
    "integration: requires a real LLM backend + key (opt-in)",
]
