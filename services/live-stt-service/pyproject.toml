[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N", "S", "BLE", "A", "C4", "T20", "SIM", "RUF"]
ignore = ["S101"]  # assert OK in tests
# Turkish project: dotless-ı etc. in docstrings/fixtures are intentional,
# not unicode confusable typos (RUF001/RUF002/RUF003).
allowed-confusables = ["ı", "İ", "ş", "Ş", "ğ", "Ğ", "ö", "Ö", "ü", "Ü", "ç", "Ç"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "S105", "S106"]
# Operator CLI tools: print is the UI, subprocess spawns are the job.
"scripts/*" = ["T201", "S603", "S607", "S110", "SIM105"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_ignores = true
warn_redundant_casts = true

[[tool.mypy.overrides]]
module = ["faster_whisper.*"]
ignore_missing_imports = true

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.pytest.ini_options]
testpaths = ["tests"]
# Codex `019e8a24` iter-1 absorb: default CI excludes integration; opt-in via
# `pytest -m integration` (manual / nightly / self-hosted with model cache).
addopts = "-ra -v --strict-markers -m 'not integration'"
markers = [
    "integration: requires real audio fixture + Whisper model (opt-in)",
    "slow: takes > 5s",
]
# Note: asyncio_mode set in conftest.py when pytest-asyncio is installed (dev only).
# Test suite is currently sync; FastAPI TestClient uses anyio under the hood.
