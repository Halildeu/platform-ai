# platform-ai service CI — lint + type-check + unit tests per service.
# Runs on every PR and push to main so failures surface as logs in the PR
# instead of being discovered on the GPU host at deploy time.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  repo-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Retention gate unit tests
        run: python3 -m unittest discover -s tests/unit -p "test_retention_gate.py"

      - name: Faz 24 AI gate ingest unit tests
        run: python3 -m unittest discover -s tests/unit -p "test_faz24_ai_gate_ingest.py"

      - name: Diarization decision gate unit tests
        run: python3 -m unittest discover -s tests/unit -p "test_diar_decision_gate.py"

      - name: GPU host update script unit tests
        run: python3 -m unittest discover -s tests/unit -p "test_gpu_host_update_script.py"

      - name: GPU host update script PowerShell parse
        shell: pwsh
        run: |
          foreach ($script in @("deploy/gpu-host/update.ps1", "deploy/gpu-host/drift-guard.ps1")) {
            [scriptblock]::Create((Get-Content -Raw $script)) | Out-Null
          }

      - name: Current retention readiness snapshot
        run: |
          set +e
          python3 scripts/retention_gate.py \
            --evidence docs/evidence/retention-readiness-2026-06-25.json \
            --repo-root .
          gate_status=$?
          if [ "$gate_status" -eq 0 ]; then
            echo "Current #156 snapshot passed prematurely; VERBIS evidence is still pending"
            exit 1
          fi
          if [ "$gate_status" -ne 1 ]; then
            echo "Current #156 snapshot must remain blocked until VERBIS evidence exists"
            exit 1
          fi

      - name: Current diarization decision snapshot
        run: |
          set +e
          python3 services/diarization-service/scripts/diar_decision_gate.py \
            --evidence docs/evidence/diar-results-2026-06-17.jsonl \
            --max-der 0.30 \
            --max-rtf 0.15 \
            --max-latency-ms 2500 \
            --max-peak-vram-delta-mb 4096 \
            --min-samples 8 > /tmp/diar-decision-result.json
          gate_status=$?
          set -e
          python3 - <<'PY'
          import json
          from pathlib import Path

          result = json.loads(Path("/tmp/diar-decision-result.json").read_text())
          if result.get("status") != "blocked":
              raise SystemExit(
                  "Current #161 diarization snapshot must remain blocked until "
                  "approved pilot decision evidence exists"
              )
          PY
          if [ "$gate_status" -ne 1 ]; then
            echo "Current #161 diarization decision snapshot must return non-zero while blocked"
            exit 1
          fi

  service-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - diarization-service
          - final-stt-service
          - live-stt-service
          - meeting-ai-service
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            services/${{ matrix.service }}/requirements.txt
            services/${{ matrix.service }}/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff
        run: python -m ruff check .

      - name: Mypy
        run: python -m mypy app

      - name: Pytest (unit)
        run: python -m pytest tests/unit -q
