# platform-ai service CI — lint + type-check + unit tests per service.
# Runs on every PR and push to main so failures surface as logs in the PR
# instead of being discovered on the GPU host at deploy time.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  repo-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Retention gate unit tests
        run: python3 -m unittest discover -s tests/unit -p "test_retention_gate.py"

      - name: Faz 24 AI gate ingest unit tests
        run: python3 -m unittest discover -s tests/unit -p "test_faz24_ai_gate_ingest.py"

      - name: Current retention readiness snapshot
        run: |
          set +e
          python3 scripts/retention_gate.py \
            --evidence docs/evidence/retention-readiness-2026-06-25.json \
            --repo-root .
          gate_status=$?
          if [ "$gate_status" -eq 0 ]; then
            echo "Current #156 snapshot passed prematurely; DB retention + VERBIS evidence is still pending"
            exit 1
          fi
          if [ "$gate_status" -ne 1 ]; then
            echo "Current #156 snapshot must remain blocked until DB retention + VERBIS evidence exists"
            exit 1
          fi

  service-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - diarization-service
          - final-stt-service
          - live-stt-service
          - meeting-ai-service
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            services/${{ matrix.service }}/requirements.txt
            services/${{ matrix.service }}/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff
        run: python -m ruff check .

      - name: Mypy
        run: python -m mypy app

      - name: Pytest (unit)
        run: python -m pytest tests/unit -q
